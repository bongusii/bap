<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chải Lông Cho Bắp - Bản Mobile Nguy Hiểm</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fce4ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            overflow: hidden; /* Ngăn cuộn trang trên mobile */
        }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px; /* Tối đa 400px, thu nhỏ trên màn hẹp */
            height: 100vh;
            max-height: 600px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden; 
            text-align: center;
            touch-action: none; /* Quan trọng: Ngăn trình duyệt cuộn/zoom khi vuốt chải */
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px;
            color: #d81b60;
            position: relative;
            z-index: 10; 
        }

        #message {
            font-size: 20px;
            font-weight: bold;
            height: 30px;
            color: #333;
            margin-top: 10px;
            position: relative;
            z-index: 10;
            padding: 0 10px;
        }

        #cat-area {
            width: 100%;
            height: 350px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .cat-image {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            pointer-events: none;
            transition: transform 0.1s; 
        }

        .cat-image.brushing {
            transform: scale(0.95) rotate(-3deg); /* Làm rõ hiệu ứng rung hơn trên mobile */
        }

        @keyframes biteZoom {
            0% { transform: scale(1); }
            100% { transform: scale(3); } /* Zoom to hơn chút nữa cho ngợp */
        }

        .cat-image.biting-zoom {
            animation: biteZoom 0.5s ease-out forwards;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
            border: 2px solid red;
        }

        /* ========================================= */
        /* [MỚI] GIAO DIỆN MÀN HÌNH GAME OVER        */
        /* ========================================= */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* Lớp phủ đen mờ */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none; /* Bỏ qua click khi đang ẩn */
            transition: opacity 0.4s ease;
            z-index: 50;
        }

        #game-over-screen.show {
            opacity: 1;
            pointer-events: auto; /* Nhận click khi hiện */
        }

        .go-title {
            color: #ff5252;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 10px;
            text-align: center;
            line-height: 1.2;
        }

        .go-score {
            color: #fff;
            font-size: 20px;
            margin-bottom: 40px;
        }

        .go-score span {
            color: #ffeb3b;
            font-size: 28px;
            font-weight: bold;
        }

        #restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #d81b60, #ff4081);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.5);
        }

        #restart-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">Điểm: <span id="score">0</span></div>
        <div id="message">Vuốt để chải lông cho Bắp!</div>
        
        <div id="cat-area">
            <img id="cat-img" class="cat-image" src="" alt="Mèo">
        </div>
        
        <div id="game-over-screen">
            <div class="go-title">BỊ NGOẠM RỒI<br>QUÁ YẾU NGHỀ!!!</div>
            <div class="go-score">Điểm chải lông: <span id="final-score">0</span></div>
            <button id="restart-btn" onclick="startGame()">Chơi Lại Đi</button>
        </div>
    </div>

    <script>
        const IMG_NORMAL = "lung.png"; 
        const IMG_GLARE = "luom.png";     
        const IMG_BITE = "ngoam.png"; 

        let score = 0;
        let state = 'normal';
        let isGameOver = false;
        let isBrushing = false;
        let stateTimer;

        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');
        const catImg = document.getElementById('cat-img');
        const catArea = document.getElementById('cat-area');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');

        // [CẬP NHẬT] Dùng Pointer Events để hỗ trợ mượt mà cả chuột và cảm ứng điện thoại
        catArea.addEventListener('pointerdown', (e) => {
            if(isGameOver) return;
            isBrushing = true;
            catImg.classList.add('brushing');
            brushCat();
            // Bắt trọn event di chuyển kể cả khi ngón tay lướt ra ngoài viền catArea
            catArea.setPointerCapture(e.pointerId); 
        });

        catArea.addEventListener('pointerup', (e) => {
            isBrushing = false;
            if(!isGameOver) {
                catImg.classList.remove('brushing');
            }
            catArea.releasePointerCapture(e.pointerId);
        });

        // Bổ sung phòng hờ bị ngắt cảm ứng (VD: có cuộc gọi tới)
        catArea.addEventListener('pointercancel', (e) => {
            isBrushing = false;
            catImg.classList.remove('brushing');
        });

        catArea.addEventListener('pointermove', (e) => {
            if(isGameOver || !isBrushing) return;
            brushCat();
        });

        function brushCat() {
            if (state === 'glaring') {
                gameOver();
            } else if (state === 'normal') {
                score++;
                scoreEl.innerText = Math.floor(score / 5); 
            }
        }

        function scheduleNextState() {
            if (isGameOver) return;
            let timeToGlare = Math.random() * 3000 + 2000; // Nghỉ từ 2 - 5s
            stateTimer = setTimeout(() => {
                setCatState('glaring');
                
                // [CẬP NHẬT] Thời gian lườm random từ 1s (1000ms) đến 3s (3000ms)
                let glareDuration = Math.random() * 2000 + 1000; 
                
                setTimeout(() => {
                    if (!isGameOver && state === 'glaring') {
                        setCatState('normal');
                        scheduleNextState();
                    }
                }, glareDuration);
            }, timeToGlare);
        }

        function setCatState(newState) {
            if (isGameOver) return;
            state = newState;

            if (state === 'normal') {
                catImg.src = IMG_NORMAL;
                messageEl.innerText = "Vuốt vuốt chải chải nào!";
                messageEl.style.color = "#333";
            } else if (state === 'glaring') {
                catImg.src = IMG_GLARE;
                messageEl.innerText = "Nàooo!!! Làm gì đếi bro?!";
                messageEl.style.color = "#ff9800";
                
                if (isBrushing) {
                    gameOver();
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            state = 'biting';
            catImg.src = IMG_BITE;
            
            catImg.classList.remove('brushing');
            catImg.classList.add('biting-zoom');

            messageEl.innerText = "BẠN ĐÃ BỊ NGOẠM!";
            messageEl.style.color = "red";
            
            clearTimeout(stateTimer);
            
            // Cập nhật điểm cuối và hiện màn hình Game Over sau 0.3s chờ zoom
            finalScoreEl.innerText = Math.floor(score / 5);
            setTimeout(() => {
                gameOverScreen.classList.add('show');
            }, 300);
        }

        function startGame() {
            score = 0;
            scoreEl.innerText = "0";
            isGameOver = false;
            isBrushing = false;
            
            // Ẩn màn hình game over
            gameOverScreen.classList.remove('show');
            
            catImg.classList.remove('biting-zoom');
            catImg.classList.remove('brushing');
            
            catImg.style.boxShadow = "none";
            catImg.style.border = "none";

            setCatState('normal');
            clearTimeout(stateTimer);
            
            // Cho người chơi 1 giây chuẩn bị trước khi bắt đầu tính random lườm
            setTimeout(() => {
                scheduleNextState();
            }, 1000);
        }

        // Bắt đầu ngay khi load
        startGame();
    </script>
</body>
</html>
