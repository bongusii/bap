<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chải Lông Cho Bắp - Bản Mobile Nguy Hiểm</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fce4ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px; 
            height: 100vh;
            max-height: 600px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden; 
            text-align: center;
            touch-action: none;
        }

        #score-board {
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px;
            color: #d81b60;
            position: relative;
            z-index: 10; 
        }

        #message {
            font-size: 20px;
            font-weight: bold;
            height: 30px;
            color: #333;
            margin-top: 10px;
            position: relative;
            z-index: 10;
            padding: 0 10px;
        }

        #cat-area {
            width: 100%;
            height: 350px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .cat-image {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            pointer-events: none;
            transition: transform 0.1s; 
        }

        .cat-image.brushing {
            transform: scale(0.95) rotate(-3deg); 
        }

        @keyframes biteZoom {
            0% { transform: scale(1); }
            100% { transform: scale(3); } 
        }

        .cat-image.biting-zoom {
            animation: biteZoom 0.5s ease-out forwards;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
            border: 2px solid red;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.4s ease;
            z-index: 50;
        }

        #game-over-screen.show {
            opacity: 1;
            pointer-events: auto; 
        }

        .go-title {
            color: #ff5252;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 10px;
            text-align: center;
            line-height: 1.2;
        }

        .go-score {
            color: #fff;
            font-size: 20px;
            margin-bottom: 40px;
        }

        .go-score span {
            color: #ffeb3b;
            font-size: 28px;
            font-weight: bold;
        }

        #restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #d81b60, #ff4081);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.5);
        }

        #restart-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">Điểm: <span id="score">0</span></div>
        <div id="message">Vuốt để chải lông cho Bắp!</div>
        
        <div id="cat-area">
            <img id="cat-img" class="cat-image" src="" alt="Mèo">
        </div>
        
        <div id="game-over-screen">
            <div class="go-title">BỊ NGOẠM RỒI<br>QUÁ YẾU NGHỀ!!!</div>
            <div class="go-score">Điểm chải lông: <span id="final-score">0</span></div>
            <button id="restart-btn" onclick="startGame()">Chơi Lại Đi</button>
        </div>
    </div>

    <script>
        const IMG_NORMAL = "lung.png"; 
        const IMG_GLARE = "luom.png";     
        const IMG_BITE = "ngoam.png"; 

        let score = 0;
        let state = 'normal';
        let isGameOver = false;
        let isBrushing = false;
        let stateTimer;
        
        // [MỚI] Biến để quản lý thời gian ân hạn 1 giây
        let graceTimer;
        let gracePeriodActive = false;

        const scoreEl = document.getElementById('score');
        const messageEl = document.getElementById('message');
        const catImg = document.getElementById('cat-img');
        const catArea = document.getElementById('cat-area');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');

        catArea.addEventListener('pointerdown', (e) => {
            if(isGameOver) return;
            isBrushing = true;
            catImg.classList.add('brushing');
            brushCat();
            catArea.setPointerCapture(e.pointerId); 
        });

        catArea.addEventListener('pointerup', (e) => {
            isBrushing = false;
            if(!isGameOver) {
                catImg.classList.remove('brushing');
            }
            catArea.releasePointerCapture(e.pointerId);
        });

        catArea.addEventListener('pointercancel', (e) => {
            isBrushing = false;
            catImg.classList.remove('brushing');
        });

        catArea.addEventListener('pointermove', (e) => {
            if(isGameOver || !isBrushing) return;
            brushCat();
        });

        function brushCat() {
            if (state === 'glaring') {
                // [CẬP NHẬT] Nếu hết 1 giây ân hạn mà vẫn chải (hoặc chải lại) thì mới game over
                if (!gracePeriodActive) {
                    gameOver();
                }
            } else if (state === 'normal') {
                score++;
                scoreEl.innerText = Math.floor(score / 5); 
            }
        }

        function scheduleNextState() {
            if (isGameOver) return;
            let timeToGlare = Math.random() * 3000 + 2000; 
            stateTimer = setTimeout(() => {
                setCatState('glaring');
                
                // [CẬP NHẬT] Thời gian lườm random từ 1.5s (1500ms) đến 3.5s (3500ms)
                // Đảm bảo Bắp lườm đủ lâu để có tác dụng sau 1 giây ân hạn
                let glareDuration = Math.random() * 2000 + 1500; 
                
                setTimeout(() => {
                    if (!isGameOver && state === 'glaring') {
                        setCatState('normal');
                        scheduleNextState();
                    }
                }, glareDuration);
            }, timeToGlare);
        }

        function setCatState(newState) {
            if (isGameOver) return;
            state = newState;

            if (state === 'normal') {
                catImg.src = IMG_NORMAL;
                messageEl.innerText = "Vuốt vuốt chải chải nào!";
                messageEl.style.color = "#333";
                
                // Hủy bộ đếm ân hạn nếu quay về bình thường
                gracePeriodActive = false;
                clearTimeout(graceTimer);
                
            } else if (state === 'glaring') {
                catImg.src = IMG_GLARE;
                messageEl.innerText = "NÀOOO! Làm gì đếi broo?!";
                messageEl.style.color = "#ff9800";
                
                // [MỚI] Kích hoạt 1 giây ân hạn
                gracePeriodActive = true;
                graceTimer = setTimeout(() => {
                    gracePeriodActive = false;
                    
                    // Kiểm tra: Sau đúng 1 giây, nếu sen vẫn ngoan cố chải -> Ngoạm ngay
                    if (isBrushing && !isGameOver && state === 'glaring') {
                        gameOver();
                    }
                }, 1000); // 1000ms = 1 giây
            }
        }

        function gameOver() {
            isGameOver = true;
            state = 'biting';
            catImg.src = IMG_BITE;
            
            catImg.classList.remove('brushing');
            catImg.classList.add('biting-zoom');

            messageEl.innerText = "CHẢI NỮA LÀ BỊ NGOẠM!";
            messageEl.style.color = "red";
            
            clearTimeout(stateTimer);
            clearTimeout(graceTimer); // Hủy bộ đếm ân hạn để an toàn
            
            finalScoreEl.innerText = Math.floor(score / 5);
            setTimeout(() => {
                gameOverScreen.classList.add('show');
            }, 300);
        }

        function startGame() {
            score = 0;
            scoreEl.innerText = "0";
            isGameOver = false;
            isBrushing = false;
            gracePeriodActive = false;
            
            gameOverScreen.classList.remove('show');
            
            catImg.classList.remove('biting-zoom');
            catImg.classList.remove('brushing');
            
            catImg.style.boxShadow = "none";
            catImg.style.border = "none";

            setCatState('normal');
            clearTimeout(stateTimer);
            clearTimeout(graceTimer);
            
            setTimeout(() => {
                scheduleNextState();
            }, 1000);
        }

        startGame();
    </script>
</body>
</html>
